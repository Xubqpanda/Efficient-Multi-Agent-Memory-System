# experiments/configs/benchmarks/frontierscience.yaml
# ================================================================
# FrontierScience 数据集与评测设置
# 与使用的方法（memory / agent framework）完全无关
# ================================================================

benchmark:
  name: frontierscience
  data_path: experiments/benchmarks/FrontierScience/data/frontierscience.csv

tracks:
  olympiad:
    enabled: true
    num_trials: 20              # 论文设定；smoke test 时用 --override 覆盖
    subject: null               # null = 全部；或 "physics" / "chemistry" 等
    limit: null                 # null = 全量

  research:
    enabled: true
    num_trials: 30
    subject: null
    limit: null
    success_threshold: 7.0      # rubric 均分 >= 7 视为成功