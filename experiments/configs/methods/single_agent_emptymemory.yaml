# experiments/configs/methods/single_agent_emptymemory.yaml
# ================================================================
# 方法设置：No Agent Framework + Empty Memory（纯 baseline）
# 与具体跑哪个数据集完全无关
# ================================================================

experiment:
  name: single_agent_emptymemory        # 结果目录名，建议与文件名保持一致
  memory_method: empty                  # empty / generative / voyager / g_memory / ours
  agent_framework: single_agent         # single_agent / autogen / dylan / macnet

model:
  solver: o4-mini           # 被评测的模型
  judge: gpt-5                 # 打分模型
  reasoning_effort: null        # null / low / medium / high（o1/o3 系列用）

output:
  dir: experiments/results
  max_workers: 1                # 并行 trial 数；1 = 顺序执行（debug 用）
  verbose: true                # true 时打印 judge 完整输出